[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/slots-api/Dockerfile"
watchPatterns = [
  "apps/slots-api/**",
  "packages/slotboard-core/**",
  "package.json",
  "package-lock.json",
  "tsconfig.base.json",
  "railway.retention.toml"
]

[deploy]
preDeployCommand = ["npm run migrate:prod --workspace @fresh-feel/slots-api"]
startCommand = "npm run retention:prod --workspace @fresh-feel/slots-api"
cronSchedule = "0 2 * * *"
restartPolicyType = "NEVER"
