name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck, build, and readiness tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: slotboard
          POSTGRES_USER: slotboard
          POSTGRES_PASSWORD: slotboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U slotboard -d slotboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SLOTBOARD_DATABASE_URL: postgres://slotboard:slotboard@localhost:5432/slotboard?sslmode=disable
      SLOTBOARD_TOKEN_PEPPER: ci-token-pepper-replace-before-production
      SLOTBOARD_AUTH_SECRET: ci-auth-secret-replace-before-production
      SLOTBOARD_OPS_SECRET: ci-ops-secret-replace-before-production
      SLOTBOARD_EMAIL_PROVIDER: console
      SLOTBOARD_PUBLIC_APP_URL: http://127.0.0.1:5174
      SLOTBOARD_WEB_ORIGINS: http://127.0.0.1:5174,http://localhost:5174
      VITE_SLOTBOARD_API_URL: http://127.0.0.1:3014

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate --workspace @fresh-feel/slots-api

      - name: Run end-to-end readiness suite
        run: npm run test:e2e
