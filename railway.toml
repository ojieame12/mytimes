[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/slots-api/Dockerfile"
watchPatterns = [
  "apps/slots-api/**",
  "packages/slotboard-core/**",
  "package.json",
  "package-lock.json",
  "tsconfig.base.json",
  "railway.toml"
]

[deploy]
preDeployCommand = ["npm run migrate:prod --workspace @fresh-feel/slots-api"]
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
